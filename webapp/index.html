<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Folder Buddies</title>
  <link rel="icon" href="favicon.ico" sizes="any">
  <link rel="icon" href="favicon.png" type="image/png" sizes="512x512">
  <link rel="apple-touch-icon" href="apple-touch-icon.png">
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <main class="window" aria-label="Folder Buddies">
    <div class="tabbar" role="tablist">
      <button class="tab active" data-tab="share" role="tab" aria-selected="true">Host</button>
      <button class="tab" data-tab="connect" role="tab" aria-selected="false">Connect</button>
    </div>

    <section class="tabpage" data-page="share" role="tabpanel">
      <form onsubmit="return false">
        <div class="row">
          <label for="folderInput">Folder:</label>
          <div class="field">
            <input id="folderInput" type="text" readonly placeholder="Choose a folder to host">
            <button id="browseFolder" type="button">Browse…</button>
          </div>
        </div>

        <div class="row">
          <label for="maxClients">Max clients:</label>
          <div class="field">
            <input id="maxClients" type="number" min="0" max="9999" step="1" value="0">
            <span class="hint">0 = unlimited</span>
          </div>
        </div>

        <div class="row">
          <label for="allowWrites">Access:</label>
          <label class="checkline">
            <input id="allowWrites" type="checkbox">
            Allow clients to upload and delete files
          </label>
        </div>

        <div class="row">
          <label for="secureHash">Security:</label>
          <label class="checkline">
            <input id="secureHash" type="checkbox">
            Secure hash code (long code; stronger secret than 6 chars)
          </label>
        </div>



        <div class="row">
          <span></span>
          <button id="shareToggle" type="button" class="primary">Host</button>
        </div>

        <div class="row">
          <label for="connectCode">Connect code:</label>
          <div class="field">
            <textarea id="connectCode" readonly rows="3"></textarea>
            <button id="copyAll" type="button" disabled>Copy</button>
          </div>
        </div>

        <div id="offlineAnswerRow" class="row" hidden>
          <label for="offlineAnswerInput">Client answer:</label>
          <div class="field">
            <textarea id="offlineAnswerInput" placeholder="paste the client's offline answer code here" rows="3"></textarea>
            <button id="applyOfflineAnswer" type="button">Apply</button>
          </div>
        </div>

        <div class="row">
          <label>Status:</label>
          <span id="shareStatus" class="statusvalue">Not hosting.</span>
        </div>
      </form>
    </section>

    <section class="tabpage" data-page="connect" role="tabpanel" hidden>
      <form onsubmit="return false">
        <div class="row">
          <label for="connectInput">Connect code:</label>
          <textarea id="connectInput" autocomplete="off" rows="3"></textarea>
        </div>

        <div id="offlineAnswerOutRow" class="row" hidden>
          <label for="offlineAnswerOut">Answer code:</label>
          <div class="field">
            <textarea id="offlineAnswerOut" readonly placeholder="send this back to the host" rows="3"></textarea>
            <button id="copyOfflineAnswer" type="button">Copy answer</button>
          </div>
        </div>

        <div class="row">
          <span></span>
          <button id="connectToggle" type="button" class="primary">Connect</button>
        </div>

        <div class="row">
          <label>Status:</label>
          <span id="connectStatus" class="statusvalue">Not connected.</span>
        </div>
      </form>

      <section id="explorer" class="explorer" hidden aria-label="Remote files">
        <div class="explorerbar">
          <nav id="currentPath" class="pathbar" aria-label="Current folder"></nav>
          <div class="exploreractions">
            <input id="uploadInput" type="file" multiple hidden>
            <input id="folderUploadInput" type="file" webkitdirectory directory multiple hidden>
            <button id="uploadButton" type="button" disabled>Upload</button>
            <button id="uploadFolderButton" type="button" disabled>Upload folder</button>
            <button id="shareFolderButton" type="button">Share link</button>
            <button id="upButton" type="button">Up</button>
          </div>
        </div>
        <div id="dropzone" class="dropzone" hidden></div>
        <table>
          <thead><tr><th>Name</th><th>Size</th><th></th></tr></thead>
          <tbody id="fileRows"></tbody>
        </table>
        <div id="transfers"></div>
        <section id="previewPanel" class="preview" hidden aria-label="File preview">
          <div class="previewbar">
            <strong id="previewTitle"></strong>
            <div class="previewactions">
              <button id="savePreview" type="button" hidden>Save</button>
              <button id="closePreview" type="button">Close</button>
            </div>
          </div>
          <div id="previewBody" class="previewbody"></div>
        </section>
      </section>
    </section>

    <div class="statusbar"><span id="statsLabel">Idle</span></div>
  </main>

  <section id="unsupportedBrowser" class="unsupported" role="alert" hidden>
    <strong>Unsupported browser</strong>
    <span>Folder Buddies needs a current browser with WebRTC, Web Crypto, WebSockets, and downloads.</span>
    <small data-unsupported-detail></small>
  </section>

  <div id="toast" role="status" aria-live="polite"></div>
  <div id="turnstileMount" class="turnstile-mount" aria-hidden="true"></div>

  <script src="config.js"></script>
  <script src="https://challenges.cloudflare.com/turnstile/v0/api.js?render=explicit" async defer></script>
  <script type="module" src="app.js"></script>
</body>
</html>
