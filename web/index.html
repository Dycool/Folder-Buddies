<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Folder Buddies</title>
  <link rel="icon" href="icon.png" type="image/png">
  <link rel="apple-touch-icon" href="icon.png">
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <main class="window" aria-label="Folder Buddies">
    <div class="titlebar">
      <div class="dots" aria-hidden="true">
        <span class="dot red"></span>
        <span class="dot yellow"></span>
        <span class="dot green"></span>
      </div>
      Folder Buddies
    </div>

    <div class="tabbar" role="tablist">
      <button class="tab active" data-tab="share" role="tab" aria-selected="true">Share a folder</button>
      <button class="tab" data-tab="connect" role="tab" aria-selected="false">Connect to a share</button>
    </div>

    <section class="tabpage" data-page="share" role="tabpanel">
      <form onsubmit="return false">
        <div class="row">
          <label for="folderInput">Folder:</label>
          <div class="field">
            <input id="folderInput" type="text" readonly placeholder="Choose a folder to share">
            <button id="browseFolder" type="button">Browse…</button>
          </div>
        </div>

        <div class="row">
          <label for="maxClients">Max clients:</label>
          <div class="field">
            <input id="maxClients" type="number" min="0" max="9999" step="1" value="0">
            <span class="hint">0 = unlimited</span>
          </div>
        </div>

        <div class="row">
          <span></span>
          <p class="note">Share just the 6-character code (or the link) — there is no separate
          password. Cloudflare only relays an opaque encrypted handshake and never sees the
          addresses exchanged.</p>
        </div>

        <div class="row">
          <span></span>
          <button id="shareToggle" type="button" class="primary">Start sharing</button>
        </div>

        <div class="row">
          <label for="connectCode">Connect code:</label>
          <div class="field">
            <input id="connectCode" type="text" readonly placeholder="6-char room code appears here">
            <button id="copyAll" type="button" disabled>Copy all</button>
          </div>
        </div>

        <div class="row">
          <label>Status:</label>
          <span id="shareStatus" class="statusvalue">Not sharing.</span>
        </div>
      </form>
    </section>

    <section class="tabpage" data-page="connect" role="tabpanel" hidden>
      <form onsubmit="return false">
        <div class="row">
          <label for="connectInput">Connect code:</label>
          <input id="connectInput" type="text" autocomplete="off" placeholder="paste the 6-char room code or share link">
        </div>

        <div class="row">
          <span></span>
          <button id="connectToggle" type="button" class="primary">Connect &amp; browse</button>
        </div>

        <div class="row">
          <label>Status:</label>
          <span id="connectStatus" class="statusvalue">Not connected.</span>
        </div>
      </form>

      <section id="explorer" class="explorer" hidden aria-label="Remote files">
        <div class="explorerbar">
          <code id="currentPath">/</code>
          <button id="upButton" type="button">Up</button>
        </div>
        <table>
          <thead><tr><th>Name</th><th>Size</th><th></th></tr></thead>
          <tbody id="fileRows"></tbody>
        </table>
        <div id="transfers"></div>
      </section>
    </section>

    <div class="statusbar"><span id="statsLabel">Idle</span></div>
  </main>

  <div id="toast" role="status" aria-live="polite"></div>
  <div id="turnstileMount" class="turnstile-mount" aria-hidden="true"></div>

  <script src="config.js"></script>
  <script src="https://challenges.cloudflare.com/turnstile/v0/api.js?render=explicit" async defer></script>
  <script type="module" src="app.js"></script>
</body>
</html>
