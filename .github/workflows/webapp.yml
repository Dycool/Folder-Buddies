name: Webapp

on:
  push:
    branches: [main]
    paths:
      - 'web/**'
      - 'icon.png'
      - '.github/workflows/webapp.yml'
  pull_request:
    paths:
      - 'web/**'
      - 'icon.png'
      - '.github/workflows/webapp.yml'
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: webapp-pages-${{ github.ref }}
  cancel-in-progress: true

jobs:
  validate:
    name: Validate static webapp
    runs-on: ubuntu-24.04
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v6

      - name: Syntax-check browser scripts
        run: |
          node --check web/config.js
          node --input-type=module --check < web/app.js
          node --input-type=module --check < web/vendor/noble/argon2.js

      - name: Verify static webapp files
        shell: bash
        run: |
          set -euo pipefail
          test -f web/index.html
          test -f web/style.css
          test -f web/app.js
          test -f web/vendor/noble/argon2.js
          test -f icon.png
          grep -q 'showDirectoryPicker' web/app.js
          grep -q 'RTCPeerConnection' web/app.js
          grep -q 'FileSystemDirectoryHandle\|showDirectoryPicker' web/README.md

  package:
    name: Package Pages artifact
    needs: validate
    runs-on: ubuntu-24.04
    timeout-minutes: 10
    if: github.event_name != 'pull_request'
    steps:
      - uses: actions/checkout@v6

      - name: Prepare static site
        shell: bash
        env:
          FB_SIGNALING_URL: ${{ vars.FB_SIGNALING_URL }}
          TURNSTILE_SITE_KEY: ${{ vars.TURNSTILE_SITE_KEY }}
          FIREBASE_API_KEY: ${{ vars.FIREBASE_API_KEY }}
          FIREBASE_AUTH_DOMAIN: ${{ vars.FIREBASE_AUTH_DOMAIN }}
          FIREBASE_DATABASE_URL: ${{ vars.FIREBASE_DATABASE_URL }}
          FIREBASE_PROJECT_ID: ${{ vars.FIREBASE_PROJECT_ID }}
          FIREBASE_APP_ID: ${{ vars.FIREBASE_APP_ID }}
        run: |
          set -euo pipefail
          rm -rf _site
          mkdir -p _site
          cp -R web/. _site/
          cp icon.png _site/icon.png
          touch _site/.nojekyll
          python3 - <<'PY'
          import json
          import os
          from pathlib import Path
          url = os.environ.get('FB_SIGNALING_URL', '')
          firebase = {
              'apiKey': os.environ.get('FIREBASE_API_KEY', ''),
              'authDomain': os.environ.get('FIREBASE_AUTH_DOMAIN', ''),
              'databaseURL': os.environ.get('FIREBASE_DATABASE_URL', ''),
              'projectId': os.environ.get('FIREBASE_PROJECT_ID', ''),
              'appId': os.environ.get('FIREBASE_APP_ID', ''),
          }
          Path('_site/config.js').write_text(
              '// Generated by GitHub Actions from public repository variables.\n'
              'window.FB_WEBAPP_CONFIG = ' + json.dumps({
                  'signalingUrl': url,
                  'turnstileSiteKey': os.environ.get('TURNSTILE_SITE_KEY', ''),
                  'firebase': firebase,
              }, indent=2) + ';\n'
          )
          PY

      - name: Upload GitHub Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: _site

  deploy:
    name: Deploy to GitHub Pages
    needs: package
    runs-on: ubuntu-24.04
    timeout-minutes: 10
    if: github.event_name != 'pull_request'
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy Pages artifact
        id: deployment
        uses: actions/deploy-pages@v4
