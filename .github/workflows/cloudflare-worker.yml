name: Cloudflare Worker

on:
  push:
    branches: [main]
    paths:
      - 'databases/cloudflare/**'
      - '.github/workflows/cloudflare-worker.yml'
      - '.github/workflows/security.yml'
  pull_request:
    paths:
      - 'databases/cloudflare/**'
      - '.github/workflows/cloudflare-worker.yml'
      - '.github/workflows/security.yml'
  workflow_dispatch:
    inputs:
      deploy:
        description: Deploy the Worker after validation
        type: boolean
        required: true
        default: false
  workflow_call:
    inputs:
      deploy:
        required: false
        type: boolean
        default: false

permissions:
  contents: read

concurrency:
  group: cloudflare-worker-${{ github.ref }}
  cancel-in-progress: true

jobs:
  validate:
    name: Validate Worker
    runs-on: ubuntu-24.04
    timeout-minutes: 20
    env:
      CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
      CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
      CF_KV_ROOMS_ID: ${{ secrets.CF_KV_ROOMS_ID }}
      CF_KV_ROOMS_PREVIEW_ID: ${{ secrets.CF_KV_ROOMS_PREVIEW_ID }}
      TURNSTILE_SECRET_KEY: ${{ secrets.TURNSTILE_SECRET_KEY }}
    steps:
      - uses: actions/checkout@v6

      - name: Public repo Cloudflare config guard
        shell: bash
        run: |
          set -euo pipefail
          test -f databases/cloudflare/wrangler.toml
          grep -q 'REPLACE_WITH_YOUR_KV_NAMESPACE_ID' databases/cloudflare/wrangler.toml
          grep -q 'REPLACE_WITH_YOUR_PREVIEW_KV_NAMESPACE_ID' databases/cloudflare/wrangler.toml
          if grep -Eq '^[[:space:]]*account_id[[:space:]]*=' databases/cloudflare/wrangler.toml; then
            echo 'Do not commit account_id to databases/cloudflare/wrangler.toml. Use the CLOUDFLARE_ACCOUNT_ID secret.' >&2
            exit 1
          fi
          if grep -Eq '^[[:space:]]*(api_token|token)[[:space:]]*=' databases/cloudflare/wrangler.toml; then
            echo 'Do not commit API tokens to databases/cloudflare/wrangler.toml. Use the CLOUDFLARE_API_TOKEN secret.' >&2
            exit 1
          fi

      - name: Validate deployable Worker syntax
        run: node --check databases/cloudflare/worker.mjs

      - name: Build C++23 Worker validation core
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends cmake ninja-build g++
          cmake -S databases/cloudflare -B build/cloudflare-core -G Ninja -DCMAKE_BUILD_TYPE=Release -DCMAKE_CXX_STANDARD=23
          cmake --build build/cloudflare-core --parallel

      - name: Create temporary Wrangler config from secrets
        if: >-
          ${{
            github.event_name != 'pull_request' &&
            env.CF_KV_ROOMS_ID != '' &&
            env.CF_KV_ROOMS_PREVIEW_ID != ''
          }}
        shell: bash
        run: |
          set -euo pipefail
          python3 - <<'PY'
          import os
          from pathlib import Path

          src = Path('databases/cloudflare/wrangler.toml').read_text()
          src = src.replace('REPLACE_WITH_YOUR_KV_NAMESPACE_ID', os.environ['CF_KV_ROOMS_ID'])
          src = src.replace('REPLACE_WITH_YOUR_PREVIEW_KV_NAMESPACE_ID', os.environ['CF_KV_ROOMS_PREVIEW_ID'])
          Path('databases/cloudflare/wrangler.ci.toml').write_text(src)
          PY

      - name: Wrangler dry-run with secret KV namespace IDs
        if: >-
          ${{
            github.event_name != 'pull_request' &&
            env.CLOUDFLARE_API_TOKEN != '' &&
            env.CLOUDFLARE_ACCOUNT_ID != '' &&
            env.CF_KV_ROOMS_ID != '' &&
            env.CF_KV_ROOMS_PREVIEW_ID != ''
          }}
        run: npx --yes wrangler@4 deploy --dry-run --config databases/cloudflare/wrangler.ci.toml

      - name: Skip Wrangler dry-run when secrets are unavailable
        if: >-
          ${{
            github.event_name == 'pull_request' ||
            env.CLOUDFLARE_API_TOKEN == '' ||
            env.CLOUDFLARE_ACCOUNT_ID == '' ||
            env.CF_KV_ROOMS_ID == '' ||
            env.CF_KV_ROOMS_PREVIEW_ID == ''
          }}
        run: |
          echo 'Wrangler dry-run skipped: Cloudflare secrets are not available in this context.'

  deploy:
    name: Deploy Worker
    needs: validate
    runs-on: ubuntu-24.04
    timeout-minutes: 30
    environment: cloudflare-production
    if: >-
      ${{
        github.event_name == 'workflow_dispatch' && inputs.deploy == true ||
        github.event_name == 'workflow_call' && inputs.deploy == true
      }}
    env:
      CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
      CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
      CF_KV_ROOMS_ID: ${{ secrets.CF_KV_ROOMS_ID }}
      CF_KV_ROOMS_PREVIEW_ID: ${{ secrets.CF_KV_ROOMS_PREVIEW_ID }}
      TURNSTILE_SECRET_KEY: ${{ secrets.TURNSTILE_SECRET_KEY }}
    steps:
      - uses: actions/checkout@v6

      - name: Check required deployment secrets
        shell: bash
        run: |
          set -euo pipefail
          missing=0
          for name in CLOUDFLARE_API_TOKEN CLOUDFLARE_ACCOUNT_ID CF_KV_ROOMS_ID CF_KV_ROOMS_PREVIEW_ID; do
            if [ -z "${!name:-}" ]; then
              echo "Missing required repository secret: $name" >&2
              missing=1
            fi
          done
          exit "$missing"

      - name: Create temporary Wrangler config from secrets
        shell: bash
        run: |
          set -euo pipefail
          python3 - <<'PY'
          import os
          from pathlib import Path

          src = Path('databases/cloudflare/wrangler.toml').read_text()
          src = src.replace('REPLACE_WITH_YOUR_KV_NAMESPACE_ID', os.environ['CF_KV_ROOMS_ID'])
          src = src.replace('REPLACE_WITH_YOUR_PREVIEW_KV_NAMESPACE_ID', os.environ['CF_KV_ROOMS_PREVIEW_ID'])
          Path('databases/cloudflare/wrangler.ci.toml').write_text(src)
          PY

      - name: Deploy with Wrangler
        uses: cloudflare/wrangler-action@v3
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          workingDirectory: databases/cloudflare
          wranglerVersion: '4'
          command: deploy --config wrangler.ci.toml

      - name: Upload optional Turnstile secret
        if: env.TURNSTILE_SECRET_KEY != ''
        shell: bash
        run: |
          set -euo pipefail
          printf '%s' "$TURNSTILE_SECRET_KEY" | npx --yes wrangler@4 secret put TURNSTILE_SECRET_KEY --config databases/cloudflare/wrangler.ci.toml
