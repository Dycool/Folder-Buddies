name: Build

on:
  push:
    branches: [main]
  pull_request:
  workflow_call:
    inputs:
      release_build:
        required: false
        type: boolean
        default: false

permissions:
  contents: read

concurrency:
  group: build-${{ github.ref }}
  cancel-in-progress: true

env:
  BUILD_TYPE: Release
  FB_SIGNALING_URL: ${{ vars.FB_SIGNALING_URL }}
  FIREBASE_DATABASE_URL: ${{ vars.FIREBASE_DATABASE_URL }}
  VCPKG_COMMIT: cd61e1e26a038e82d6550a3ebbe0fbbfe7da78e3

jobs:
  build-linux:
    name: Linux AppImage
    runs-on: ubuntu-24.04
    timeout-minutes: 120
    steps:
      - uses: actions/checkout@v6

      - name: Verify C++23 project settings
        run: |
          grep -q 'set(CMAKE_CXX_STANDARD 23)' client/CMakeLists.txt
          grep -q 'set(CMAKE_CXX_STANDARD 23)' databases/cloudflare/CMakeLists.txt

      - name: Install dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends \
            build-essential cmake ninja-build pkg-config wget ca-certificates \
            qt6-base-dev qt6-base-dev-tools libfuse3-dev libminiupnpc-dev \
            libgl1-mesa-dev libegl1-mesa-dev libxkbcommon-dev fuse3 imagemagick libsodium-dev

      - name: Generate app icons
        run: |
          if [ -f client/src/icons/icon.png ]; then
            chmod +x client/src/icons/make-icons.sh
            ./client/src/icons/make-icons.sh client/src/icons/icon.png || true
            cp client/src/icons/icon.png client/icon.png
          fi

      - name: Configure
        run: |
          args=(-G Ninja -S client -B build -DCMAKE_BUILD_TYPE="$BUILD_TYPE" -DCMAKE_CXX_STANDARD=23)
          if [ -n "${FB_SIGNALING_URL:-}" ]; then
            args+=(-DFB_SIGNALING_URL="$FB_SIGNALING_URL")
          fi
          if [ -n "${FIREBASE_DATABASE_URL:-}" ]; then
            args+=(-DFB_FIREBASE_DATABASE_URL="$FIREBASE_DATABASE_URL")
          fi
          cmake "${args[@]}"

      - name: Build and test
        run: |
          cmake --build build --config "$BUILD_TYPE" --parallel
          ctest --test-dir build --output-on-failure -C "$BUILD_TYPE"

      - name: Package AppImage
        env:
          APPIMAGE_EXTRACT_AND_RUN: 1
        run: |
          DESTDIR=AppDir cmake --install build --prefix /usr
          if [ -f client/src/icons/icon.png ]; then
            cp client/src/icons/icon.png folderbuddies.png
          else
            convert -size 256x256 xc:'#2b6cb0' folderbuddies.png
          fi
          wget -q https://github.com/linuxdeploy/linuxdeploy/releases/download/continuous/linuxdeploy-x86_64.AppImage
          wget -q https://github.com/linuxdeploy/linuxdeploy-plugin-qt/releases/download/continuous/linuxdeploy-plugin-qt-x86_64.AppImage
          chmod +x linuxdeploy*.AppImage
          ./linuxdeploy-x86_64.AppImage --appdir AppDir \
            -d client/src/folderbuddies.desktop -i folderbuddies.png \
            --plugin qt --output appimage
          mv ./*.AppImage folderbuddies-linux.AppImage

      - uses: actions/upload-artifact@v4
        with:
          name: folderbuddies-linux
          path: folderbuddies-linux.AppImage
          if-no-files-found: error

  build-macos:
    name: macOS .app
    runs-on: macos-15
    timeout-minutes: 120
    env:
      MACOS_CERTIFICATE_P12: ${{ secrets.MACOS_CERTIFICATE_P12 }}
      MACOS_CERTIFICATE_PASSWORD: ${{ secrets.MACOS_CERTIFICATE_PASSWORD }}
      MACOS_CODESIGN_IDENTITY: ${{ secrets.MACOS_CODESIGN_IDENTITY }}
      APPLE_ID: ${{ secrets.APPLE_ID }}
      APPLE_APP_SPECIFIC_PASSWORD: ${{ secrets.APPLE_APP_SPECIFIC_PASSWORD }}
      APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
    steps:
      - uses: actions/checkout@v6

      - name: Install dependencies
        run: |
          brew update
          brew install cmake ninja pkg-config qt@6 miniupnpc imagemagick
          brew install --cask fuse-t || brew install macos-fuse-t/homebrew-cask/fuse-t || brew install --cask macfuse || true
          echo "$(brew --prefix qt@6)/bin" >> "$GITHUB_PATH"
          echo "PKG_CONFIG_PATH=/usr/local/lib/pkgconfig:/opt/homebrew/lib/pkgconfig:${PKG_CONFIG_PATH:-}" >> "$GITHUB_ENV"

      - name: Generate app icons
        run: |
          if [ -f client/src/icons/icon.png ]; then
            chmod +x client/src/icons/make-icons.sh
            ./client/src/icons/make-icons.sh client/src/icons/icon.png || true
            cp client/src/icons/icon.png client/icon.png
          fi

      - name: Import signing certificate
        if: env.MACOS_CERTIFICATE_P12 != '' && env.MACOS_CERTIFICATE_PASSWORD != ''
        env:
          RUNNER_TEMP_KEYCHAIN_PASSWORD: folderbuddies-ci-keychain
        run: |
          security create-keychain -p "$RUNNER_TEMP_KEYCHAIN_PASSWORD" build.keychain
          security default-keychain -s build.keychain
          security unlock-keychain -p "$RUNNER_TEMP_KEYCHAIN_PASSWORD" build.keychain
          security set-keychain-settings -lut 21600 build.keychain
          printf '%s' "$MACOS_CERTIFICATE_P12" | base64 -D > certificate.p12
          security import certificate.p12 -k build.keychain -P "$MACOS_CERTIFICATE_PASSWORD" -T /usr/bin/codesign
          security set-key-partition-list -S apple-tool:,apple:,codesign: -s -k "$RUNNER_TEMP_KEYCHAIN_PASSWORD" build.keychain

      - name: Configure
        run: |
          args=(-G Ninja -S client -B build -DCMAKE_BUILD_TYPE="$BUILD_TYPE" -DCMAKE_CXX_STANDARD=23)
          if [ -n "${FB_SIGNALING_URL:-}" ]; then
            args+=(-DFB_SIGNALING_URL="$FB_SIGNALING_URL")
          fi
          if [ -n "${FIREBASE_DATABASE_URL:-}" ]; then
            args+=(-DFB_FIREBASE_DATABASE_URL="$FIREBASE_DATABASE_URL")
          fi
          if [ -n "${FUSET_PKG:-}" ] && [ -f "$FUSET_PKG" ]; then
            args+=(-DFUSET_PKG="$FUSET_PKG")
          fi
          cmake "${args[@]}"

      - name: Build and test
        run: |
          cmake --build build --config "$BUILD_TYPE" --parallel
          ctest --test-dir build --output-on-failure -C "$BUILD_TYPE"

      - name: Bundle Qt
        run: macdeployqt build/folderbuddies.app -always-overwrite

      - name: Codesign
        if: env.MACOS_CODESIGN_IDENTITY != ''
        run: |
          codesign --force --deep --options runtime --timestamp \
            --sign "$MACOS_CODESIGN_IDENTITY" build/folderbuddies.app
          codesign --verify --deep --strict --verbose=2 build/folderbuddies.app

      - name: Notarize and staple
        if: env.MACOS_CODESIGN_IDENTITY != '' && env.APPLE_ID != '' && env.APPLE_APP_SPECIFIC_PASSWORD != '' && env.APPLE_TEAM_ID != ''
        run: |
          ditto -c -k --keepParent build/folderbuddies.app folderbuddies-macos-notary.zip
          xcrun notarytool submit folderbuddies-macos-notary.zip \
            --apple-id "$APPLE_ID" \
            --password "$APPLE_APP_SPECIFIC_PASSWORD" \
            --team-id "$APPLE_TEAM_ID" \
            --wait
          xcrun stapler staple build/folderbuddies.app

      - name: Package .app
        run: |
          rm -f folderbuddies-macos.zip
          ditto -c -k --keepParent build/folderbuddies.app folderbuddies-macos.zip

      - uses: actions/upload-artifact@v4
        with:
          name: folderbuddies-macos
          path: folderbuddies-macos.zip
          if-no-files-found: error

  build-windows:
    name: Windows static .exe
    runs-on: windows-2025
    timeout-minutes: 360
    steps:
      - uses: actions/checkout@v6

      - name: Setup MSVC
        uses: ilammy/msvc-dev-cmd@v1

      - name: Restore vcpkg binary cache
        uses: actions/cache@v5
        with:
          path: _cache/vcpkg-bincache
          key: vcpkg-windows-static-qtbase-core-gui-widgets-network-miniupnpc-libsodium-${{ env.VCPKG_COMMIT }}
          restore-keys: |
            vcpkg-windows-static-qtbase-core-gui-widgets-network-miniupnpc-libsodium-
            vcpkg-windows-static-qtbase-core-gui-widgets-network-

      - name: Bootstrap vcpkg
        shell: pwsh
        run: |
          git clone https://github.com/microsoft/vcpkg.git _deps/vcpkg
          cd _deps/vcpkg
          git checkout $env:VCPKG_COMMIT
          cd ../..
          .\_deps\vcpkg\bootstrap-vcpkg.bat -disableMetrics

      - name: Install dependencies
        shell: pwsh
        env:
          VCPKG_BINARY_SOURCES: "clear;files,${{ github.workspace }}/_cache/vcpkg-bincache,readwrite"
        run: |
          .\_deps\vcpkg\vcpkg.exe install `
            "qtbase[core,gui,widgets,network]:x64-windows-static" `
            "miniupnpc:x64-windows-static" `
            "libsodium:x64-windows-static" `
            --clean-after-build

      - name: Configure
        shell: pwsh
        env:
          VCPKG_BINARY_SOURCES: "clear;files,${{ github.workspace }}/_cache/vcpkg-bincache,readwrite"
        run: |
          $args = @(
            '-G', 'Ninja',
            '-S', 'client',
            '-B', 'build',
            "-DCMAKE_BUILD_TYPE=$env:BUILD_TYPE",
            '-DCMAKE_CXX_STANDARD=23',
            "-DCMAKE_TOOLCHAIN_FILE=$PWD/_deps/vcpkg/scripts/buildsystems/vcpkg.cmake",
            '-DVCPKG_TARGET_TRIPLET=x64-windows-static'
          )
          if ($env:FB_SIGNALING_URL) { $args += "-DFB_SIGNALING_URL=$env:FB_SIGNALING_URL" }
          if ($env:FIREBASE_DATABASE_URL) { $args += "-DFB_FIREBASE_DATABASE_URL=$env:FIREBASE_DATABASE_URL" }
          cmake @args

      - name: Build and test
        shell: pwsh
        run: |
          cmake --build build --config $env:BUILD_TYPE --parallel
          ctest --test-dir build --output-on-failure -C $env:BUILD_TYPE
          Copy-Item build/folderbuddies.exe folderbuddies-windows.exe

      - uses: actions/upload-artifact@v4
        with:
          name: folderbuddies-windows
          path: folderbuddies-windows.exe
          if-no-files-found: error
