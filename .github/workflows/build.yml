name: Build Clients

on:
  push:
    branches: [main]
  pull_request:
  workflow_call:
    inputs:
      release_build:
        required: false
        type: boolean
        default: false

permissions:
  contents: read

concurrency:
  group: build-${{ github.ref }}
  cancel-in-progress: false

env:
  BUILD_TYPE: Release
  FB_SIGNALING_URL: ${{ vars.FB_SIGNALING_URL }}
  FIREBASE_DATABASE_URL: ${{ vars.FIREBASE_DATABASE_URL }}
  VCPKG_COMMIT: cd61e1e26a038e82d6550a3ebbe0fbbfe7da78e3

jobs:
  build-linux:
    name: Linux AppImage
    runs-on: ubuntu-24.04
    timeout-minutes: 120
    steps:
      - uses: actions/checkout@v6

      - name: Verify C++23 project settings
        run: |
          grep -q 'set(CMAKE_CXX_STANDARD 23)' client/CMakeLists.txt
          grep -q 'set(CMAKE_CXX_STANDARD 23)' databases/cloudflare/CMakeLists.txt

      - name: Install dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends \
            build-essential cmake ninja-build pkg-config wget git ca-certificates \
            qt6-base-dev qt6-base-dev-tools qt6-qpa-plugins qt6-translations-l10n \
            libfuse3-3 libfuse3-dev libminiupnpc-dev libssl-dev \
            libgl1-mesa-dev libegl1-mesa-dev libxkbcommon-dev fuse3 imagemagick libsodium-dev python3-pil \
            xdg-desktop-portal

      - name: Build libdatachannel (native<->browser WebRTC bridge)
        run: |
          # Not packaged in Ubuntu's repos, so build the WebRTC transport from
          # source. OpenSSL backend + bundled libjuice (no GnuTLS / libnice).
          git clone --depth 1 --branch v0.24.5 --recurse-submodules \
            https://github.com/paullouisageneau/libdatachannel.git _deps/libdatachannel
          cmake -G Ninja -S _deps/libdatachannel -B _deps/libdatachannel/build \
            -DCMAKE_BUILD_TYPE=Release \
            -DUSE_GNUTLS=OFF -DUSE_NICE=OFF \
            -DNO_EXAMPLES=ON -DNO_TESTS=ON
          cmake --build _deps/libdatachannel/build --parallel
          sudo cmake --install _deps/libdatachannel/build
          sudo ldconfig

      - name: Generate app icons
        run: |
          if [ -f client/src/icons/icon.png ]; then
            chmod +x client/src/icons/make-icons.sh
            ./client/src/icons/make-icons.sh client/src/icons/icon.png || true
            cp client/src/icons/icon.png client/icon.png
          fi

      - name: Configure
        run: |
          args=(-G Ninja -S client -B build -DCMAKE_BUILD_TYPE="$BUILD_TYPE" -DCMAKE_CXX_STANDARD=23)
          if [ -n "${FB_SIGNALING_URL:-}" ]; then
            args+=(-DFB_SIGNALING_URL="$FB_SIGNALING_URL")
          fi
          if [ -n "${FIREBASE_DATABASE_URL:-}" ]; then
            args+=(-DFB_FIREBASE_DATABASE_URL="$FIREBASE_DATABASE_URL")
          fi
          cmake "${args[@]}"

      - name: Build and test
        run: |
          cmake --build build --config "$BUILD_TYPE" --parallel
          ctest --test-dir build --output-on-failure -C "$BUILD_TYPE"

      - name: Package AppImage
        env:
          APPIMAGE_EXTRACT_AND_RUN: 1
          QMAKE: qmake6
          LDAI_OUTPUT: folderbuddies-linux.AppImage
          NO_STRIP: 1
        run: |
          DESTDIR=AppDir cmake --install build --prefix /usr
          mkdir -p AppDir/usr/lib AppDir/usr/share/doc/libfuse3-3
          fuse3_lib="$(ldconfig -p | awk '/libfuse3\.so\.3 / { print $NF; exit }')"
          if [ -n "$fuse3_lib" ] && [ -f "$fuse3_lib" ]; then
            cp -L "$fuse3_lib" AppDir/usr/lib/libfuse3.so.3
          fi
          for fuse3_copyright in /usr/share/doc/libfuse3-3/copyright /usr/share/doc/libfuse3-3t64/copyright; do
            if [ -f "$fuse3_copyright" ]; then
              cp "$fuse3_copyright" AppDir/usr/share/doc/libfuse3-3/copyright
              break
            fi
          done
          mkdir -p AppDir/usr/share/icons/hicolor/256x256/apps
          if [ -f client/src/icons/icon.png ]; then
            convert client/src/icons/icon.png -resize 256x256 AppDir/usr/share/icons/hicolor/256x256/apps/folderbuddies.png
          else
            convert -size 256x256 xc:'#2b6cb0' AppDir/usr/share/icons/hicolor/256x256/apps/folderbuddies.png
          fi
          wget -q https://github.com/linuxdeploy/linuxdeploy/releases/download/continuous/linuxdeploy-x86_64.AppImage
          wget -q https://github.com/linuxdeploy/linuxdeploy-plugin-qt/releases/download/continuous/linuxdeploy-plugin-qt-x86_64.AppImage
          chmod +x linuxdeploy*.AppImage
          ./linuxdeploy-x86_64.AppImage --appdir AppDir \
            --exclude-library libfuse3.so.3 \
            -d client/src/folderbuddies.desktop \
            --plugin qt --output appimage

      - uses: actions/upload-artifact@v4
        with:
          name: folderbuddies-linux
          path: folderbuddies-linux.AppImage
          if-no-files-found: error

  build-macos:
    name: macOS .app
    runs-on: macos-15
    timeout-minutes: 120
    env:
      MACOS_CERTIFICATE_P12: ${{ secrets.MACOS_CERTIFICATE_P12 }}
      MACOS_CERTIFICATE_PASSWORD: ${{ secrets.MACOS_CERTIFICATE_PASSWORD }}
      MACOS_CODESIGN_IDENTITY: ${{ secrets.MACOS_CODESIGN_IDENTITY }}
      APPLE_ID: ${{ secrets.APPLE_ID }}
      APPLE_APP_SPECIFIC_PASSWORD: ${{ secrets.APPLE_APP_SPECIFIC_PASSWORD }}
      APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
    steps:
      - uses: actions/checkout@v6

      - name: Install dependencies
        run: |
          brew update
          brew install cmake ninja pkg-config qtbase miniupnpc imagemagick openssl@3
          brew tap macos-fuse-t/homebrew-cask || true
          brew install --cask fuse-t || brew install macos-fuse-t/homebrew-cask/fuse-t
          echo "$(brew --prefix qtbase)/bin" >> "$GITHUB_PATH"
          # Append the generic Homebrew prefix so CMake find_package() can locate
          # libdatachannel / miniupnpc configs (CMake does not search /opt/homebrew
          # by default on Apple Silicon).
          echo "CMAKE_PREFIX_PATH=$(brew --prefix qtbase):$(brew --prefix):${CMAKE_PREFIX_PATH:-}" >> "$GITHUB_ENV"
          echo "PKG_CONFIG_PATH=/usr/local/lib/pkgconfig:/opt/homebrew/lib/pkgconfig:${PKG_CONFIG_PATH:-}" >> "$GITHUB_ENV"
          # openssl@3 is keg-only; point CMake's FindOpenSSL at it so both the
          # libdatachannel build and any find_dependency(OpenSSL) can locate it.
          echo "OPENSSL_ROOT_DIR=$(brew --prefix openssl@3)" >> "$GITHUB_ENV"

      - name: Build libdatachannel (native<->browser WebRTC bridge)
        run: |
          # Not available as a Homebrew formula, so build the WebRTC transport
          # from source. OpenSSL backend + bundled libjuice (no GnuTLS / libnice).
          # Installed under /usr/local, which CMake's find_package searches by
          # default on macOS.
          git clone --depth 1 --branch v0.24.5 --recurse-submodules \
            https://github.com/paullouisageneau/libdatachannel.git _deps/libdatachannel
          cmake -G Ninja -S _deps/libdatachannel -B _deps/libdatachannel/build \
            -DCMAKE_BUILD_TYPE=Release \
            -DUSE_GNUTLS=OFF -DUSE_NICE=OFF \
            -DNO_EXAMPLES=ON -DNO_TESTS=ON \
            -DOPENSSL_ROOT_DIR="$(brew --prefix openssl@3)" \
            -DCMAKE_INSTALL_PREFIX=/usr/local
          cmake --build _deps/libdatachannel/build --parallel
          sudo cmake --install _deps/libdatachannel/build

      - name: Generate app icons
        run: |
          if [ -f client/src/icons/icon.png ]; then
            chmod +x client/src/icons/make-icons.sh
            ./client/src/icons/make-icons.sh client/src/icons/icon.png || true
            cp client/src/icons/icon.png client/icon.png
          fi

      - name: Import signing certificate
        if: env.MACOS_CERTIFICATE_P12 != '' && env.MACOS_CERTIFICATE_PASSWORD != ''
        env:
          RUNNER_TEMP_KEYCHAIN_PASSWORD: folderbuddies-ci-keychain
        run: |
          security create-keychain -p "$RUNNER_TEMP_KEYCHAIN_PASSWORD" build.keychain
          security default-keychain -s build.keychain
          security unlock-keychain -p "$RUNNER_TEMP_KEYCHAIN_PASSWORD" build.keychain
          security set-keychain-settings -lut 21600 build.keychain
          printf '%s' "$MACOS_CERTIFICATE_P12" | base64 -D > certificate.p12
          security import certificate.p12 -k build.keychain -P "$MACOS_CERTIFICATE_PASSWORD" -T /usr/bin/codesign
          security set-key-partition-list -S apple-tool:,apple:,codesign: -s -k "$RUNNER_TEMP_KEYCHAIN_PASSWORD" build.keychain

      - name: Configure
        run: |
          args=(-G Ninja -S client -B build -DCMAKE_BUILD_TYPE="$BUILD_TYPE" -DCMAKE_CXX_STANDARD=23)
          if [ -n "${FB_SIGNALING_URL:-}" ]; then
            args+=(-DFB_SIGNALING_URL="$FB_SIGNALING_URL")
          fi
          if [ -n "${FIREBASE_DATABASE_URL:-}" ]; then
            args+=(-DFB_FIREBASE_DATABASE_URL="$FIREBASE_DATABASE_URL")
          fi
          cmake "${args[@]}"

      - name: Build and test
        run: |
          cmake --build build --config "$BUILD_TYPE" --parallel
          ctest --test-dir build --output-on-failure -C "$BUILD_TYPE"

      - name: Bundle Qt
        run: |
          deploy_args=(build/folderbuddies.app -always-overwrite -no-codesign)

          # Homebrew's Qt 6 packages are split across qt/qtbase and plugin
          # dependencies. macdeployqt needs explicit search roots for those
          # transitive dylibs, and the FUSE3 provider may be installed by a
          # cask rather than a formula prefix.
          add_deploy_libpath() {
            local libdir="$1"
            if [ ! -d "$libdir" ]; then
              return
            fi
            for arg in "${deploy_args[@]}"; do
              if [ "$arg" = "-libpath=$libdir" ]; then
                return
              fi
            done
            deploy_args+=("-libpath=$libdir")
          }

          fuse3_dylib=""
          remember_fuse3_dylib() {
            local dylib="$1"
            if [ -z "$fuse3_dylib" ] && [ -f "$dylib" ]; then
              fuse3_dylib="$dylib"
            fi
          }

          fuse_libdir="$(pkg-config --variable=libdir fuse3 2>/dev/null || true)"
          add_deploy_libpath "$fuse_libdir"
          remember_fuse3_dylib "$fuse_libdir/libfuse3.dylib"
          remember_fuse3_dylib "$fuse_libdir/libfuse3.4.dylib"

          for token in $(pkg-config --libs-only-L fuse3 2>/dev/null || true); do
            libdir="${token#-L}"
            add_deploy_libpath "$libdir"
            remember_fuse3_dylib "$libdir/libfuse3.dylib"
            remember_fuse3_dylib "$libdir/libfuse3.4.dylib"
          done

          while IFS= read -r fuse_lib; do
            remember_fuse3_dylib "$fuse_lib"
            add_deploy_libpath "${fuse_lib%/*}"
          done < <(find /opt/homebrew /usr/local /Library \( -name 'libfuse3*.dylib' -o -name 'libfuse-t.dylib' \) -print 2>/dev/null)

          formulas=(
            qt@6 qt qtbase qtsvg qtdeclarative qtshadertools qt3d qt5compat
            qtcanvaspainter qtcharts qtconnectivity qtdatavis3d qtquicktimeline
            qtquick3d qtgraphs qtgrpc qtwebsockets qthttpserver qtimageformats
            qtlanguageserver qtserialport qtpositioning qtlocation qtlottie
            qtmultimedia qtnetworkauth qtquick3dphysics qtquickeffectmaker
            qtremoteobjects qtscxml qtsensors qtserialbus qtspeech qttasktree
            qttools qttranslations qtvirtualkeyboard qtwebchannel qtwebengine
            qtwebview brotli webp zstd libpng jpeg-turbo libtiff jasper libmng
            md4c dbus graphite2 libsodium miniupnpc libdatachannel openssl@3
          )
          for formula in "${formulas[@]}"; do
            if prefix="$(brew --prefix "$formula" 2>/dev/null)" && [ -d "$prefix/lib" ]; then
              add_deploy_libpath "$prefix/lib"
            fi
          done

          for libdir in /opt/homebrew/lib /usr/local/lib \
                        /Library/Filesystems/fuse-t.fs/Contents/Resources/lib \
                        /Library/Filesystems/fuse-t.fs/Contents/Resources \
                        /Library/Frameworks/fuse_t.framework/Versions/A \
                        /Library/Frameworks/fuse-t.framework/Versions/A; do
            add_deploy_libpath "$libdir"
          done

          printf 'macdeployqt arguments:\n'
          printf '  %s\n' "${deploy_args[@]}"

          macdeployqt "${deploy_args[@]}"

          if [ -z "$fuse3_dylib" ]; then
            echo 'Could not locate libfuse3.dylib for bundling.' >&2
            exit 1
          fi
          fuse3_name="$(basename "$fuse3_dylib")"
          echo "Bundling FUSE3 runtime: $fuse3_dylib"
          cp "$fuse3_dylib" "build/folderbuddies.app/Contents/Frameworks/$fuse3_name"
          test -f "build/folderbuddies.app/Contents/Frameworks/$fuse3_name"

      - name: Codesign
        run: |
          entitlements="client/src/macos/folderbuddies.entitlements"
          if [ -n "$MACOS_CODESIGN_IDENTITY" ]; then
            codesign --force --deep --options runtime --timestamp \
              --entitlements "$entitlements" \
              --sign "$MACOS_CODESIGN_IDENTITY" build/folderbuddies.app
          else
            codesign --force --deep \
              --entitlements "$entitlements" \
              --sign - build/folderbuddies.app
          fi
          codesign --verify --deep --strict --verbose=2 build/folderbuddies.app

      - name: Notarize and staple
        if: env.MACOS_CODESIGN_IDENTITY != '' && env.APPLE_ID != '' && env.APPLE_APP_SPECIFIC_PASSWORD != '' && env.APPLE_TEAM_ID != ''
        run: |
          ditto -c -k --keepParent build/folderbuddies.app folderbuddies-macos-notary.zip
          xcrun notarytool submit folderbuddies-macos-notary.zip \
            --apple-id "$APPLE_ID" \
            --password "$APPLE_APP_SPECIFIC_PASSWORD" \
            --team-id "$APPLE_TEAM_ID" \
            --wait
          xcrun stapler staple build/folderbuddies.app

      - name: Package .app
        run: |
          rm -f folderbuddies-macos.zip
          ditto -c -k --keepParent build/folderbuddies.app folderbuddies-macos.zip

      - uses: actions/upload-artifact@v4
        with:
          name: folderbuddies-macos
          path: folderbuddies-macos.zip
          if-no-files-found: error

  build-windows:
    name: Windows static .exe
    runs-on: windows-2025
    timeout-minutes: 360
    steps:
      - uses: actions/checkout@v6

      - name: Setup MSVC
        uses: ilammy/msvc-dev-cmd@v1

      - name: Restore vcpkg binary cache
        uses: actions/cache@v5
        with:
          path: _cache/vcpkg-bincache
          key: vcpkg-windows-static-qtbase-core-gui-widgets-network-miniupnpc-libsodium-libdatachannel-${{ env.VCPKG_COMMIT }}
          restore-keys: |
            vcpkg-windows-static-qtbase-core-gui-widgets-network-miniupnpc-libsodium-libdatachannel-
            vcpkg-windows-static-qtbase-core-gui-widgets-network-miniupnpc-libsodium-
            vcpkg-windows-static-qtbase-core-gui-widgets-network-

      - name: Bootstrap vcpkg
        shell: pwsh
        run: |
          git clone https://github.com/microsoft/vcpkg.git _deps/vcpkg
          cd _deps/vcpkg
          git checkout $env:VCPKG_COMMIT
          cd ../..
          .\_deps\vcpkg\bootstrap-vcpkg.bat -disableMetrics

      - name: Install dependencies
        shell: pwsh
        env:
          VCPKG_BINARY_SOURCES: "clear;files,${{ github.workspace }}/_cache/vcpkg-bincache,readwrite"
        run: |
          .\_deps\vcpkg\vcpkg.exe install `
            "qtbase[core,gui,widgets,network]:x64-windows-static" `
            "miniupnpc:x64-windows-static" `
            "libsodium:x64-windows-static" `
            "libdatachannel:x64-windows-static" `
            --clean-after-build

      - name: Inspect static Qt style plugin installation
        shell: pwsh
        run: |
          $qtRoot = "_deps/vcpkg/installed/x64-windows-static"
          Write-Host "=== Static Qt style plugin filesystem diagnostic ==="
          Write-Host "qtRoot=$qtRoot"
          if (-not (Test-Path $qtRoot)) { Write-Error "Missing $qtRoot"; exit 1 }
          Get-ChildItem "$qtRoot" -Recurse -File -ErrorAction SilentlyContinue |
            Where-Object { $_.Name -match 'modern|style|windows11|qwindows|qmodern' -or $_.FullName -match 'plugins[\\/]styles' } |
            Select-Object FullName, Length |
            Format-Table -AutoSize

      - name: Configure
        shell: pwsh
        env:
          VCPKG_BINARY_SOURCES: "clear;files,${{ github.workspace }}/_cache/vcpkg-bincache,readwrite"
        run: |
          $args = @(
            '-G', 'Ninja',
            '-S', 'client',
            '-B', 'build',
            "-DCMAKE_BUILD_TYPE=$env:BUILD_TYPE",
            '-DCMAKE_CXX_STANDARD=23',
            "-DCMAKE_TOOLCHAIN_FILE=$PWD/_deps/vcpkg/scripts/buildsystems/vcpkg.cmake",
            '-DVCPKG_TARGET_TRIPLET=x64-windows-static'
          )
          if ($env:FB_SIGNALING_URL) { $args += "-DFB_SIGNALING_URL=$env:FB_SIGNALING_URL" }
          if ($env:FIREBASE_DATABASE_URL) { $args += "-DFB_FIREBASE_DATABASE_URL=$env:FIREBASE_DATABASE_URL" }
          cmake @args

      - name: Build and test
        shell: pwsh
        run: |
          cmake --build build --config $env:BUILD_TYPE --parallel
          if ($LASTEXITCODE -ne 0) { exit $LASTEXITCODE }
          ctest --test-dir build --output-on-failure -C $env:BUILD_TYPE
          if ($LASTEXITCODE -ne 0) { exit $LASTEXITCODE }
          $env:QT_DEBUG_PLUGINS = "1"
          & .\build\folderbuddies.exe --diagnose-qt-style
          if ($LASTEXITCODE -ne 0) {
            Write-Error "Static Windows executable failed the mandatory Qt windows11 style diagnostic."
            exit $LASTEXITCODE
          }
          Copy-Item build/folderbuddies.exe folderbuddies-windows.exe

      - uses: actions/upload-artifact@v4
        with:
          name: folderbuddies-windows
          path: folderbuddies-windows.exe
          if-no-files-found: error
