name: Release

on:
  push:
    tags: ['v*']

permissions:
  contents: write

env:
  GH_TOKEN: ${{ github.token }}

jobs:
  build:
    uses: ./.github/workflows/build.yml
    with:
      release_build: true
    secrets: inherit

  release:
    needs: [build]
    runs-on: ubuntu-24.04
    steps:
      - name: Download all build artifacts
        uses: actions/download-artifact@v4
        with:
          path: dist
          merge-multiple: true

      - name: Create draft release
        uses: softprops/action-gh-release@v2
        with:
          draft: true
          tag_name: ${{ github.ref_name }}
          name: Folder Buddies ${{ github.ref_name }}
          generate_release_notes: true
          files: |
            dist/folderbuddies-linux.AppImage
            dist/folderbuddies-macos.zip
            dist/folderbuddies-windows.exe
